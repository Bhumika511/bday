<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:500px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
position:relative;
}

h1{
color:#ff4081;
margin-bottom:15px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4081;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#countdown{
font-size:60px;
color:#ff4081;
display:none;
margin:20px;
}

#slider{
display:none;
}

img{
width:280px;
height:340px;
object-fit:cover;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.message{
font-size:22px;
margin-top:15px;
color:#444;
min-height:60px;
}

.final{
display:none;
animation:fade 2s;
}

.final h2{
color:#ff4081;
font-size:38px;
margin:20px 0;
}

.final p{
font-size:20px;
line-height:32px;
}

.balloon{
position:absolute;
bottom:-100px;
font-size:40px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

</style>

</head>

<body>

<audio id="music">
<source src="birthday.mp3" type="audio/mp3">
</audio>

<div class="container">

<div id="gift">

<h1>🎁</h1>

<h2>A Special Surprise For You</h2>

<br>

<button onclick="start()">Open Gift</button>

</div>

<div id="countdown">3</div>

<div id="slider">

<img id="photo" src="photo1.jpg">

<div class="message" id="text"></div>

</div>

<div class="final" id="final">

<h2>🎂 Happy Birthday ❤️</h2>

<p>

May your smile always shine brighter than today.<br><br>

Wishing you endless happiness,<br>

good health,<br>

success,<br>

and beautiful memories.<br><br>

Have an Amazing Year! 🎉

</p>

</div>

</div>

<script>

const photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg"
];

const messages=[
"You make every moment beautiful ❤️",
"Thank you for all the wonderful memories 😊",
"Keep smiling because you deserve all the happiness 🌸",
"Today is all about YOU! 🎉"
];

let index=0;

function start(){

document.getElementById("gift").style.display="none";

document.getElementById("countdown").style.display="block";

document.getElementById("music").play();

let count=3;

let timer=setInterval(()=>{

document.getElementById("countdown").innerHTML=count;

count--;

if(count<0){

clearInterval(timer);

document.getElementById("countdown").style.display="none";

showSlides();

}

},1000);

}

function showSlides(){

document.getElementById("slider").style.display="block";

changeSlide();

}

function changeSlide(){

if(index<photos.length){

document.getElementById("photo").src=photos[index];

typeWriter(messages[index]);

index++;

setTimeout(changeSlide,4000);

}

else{

document.getElementById("slider").style.display="none";

document.getElementById("final").style.display="block";

confetti();

}

}

function typeWriter(text){

let i=0;

document.getElementById("text").innerHTML="";

let typing=setInterval(()=>{

document.getElementById("text").innerHTML+=text.charAt(i);

i++;

if(i>=text.length)

clearInterval(typing);

},60);

}

function confetti(){

for(let i=0;i<25;i++){

let b=document.createElement("div");

b.className="balloon";

b.innerHTML=["🎈","🎉","🎊","❤️","✨"][Math.floor(Math.random()*5)];

b.style.left=Math.random()*100+"vw";

b.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(b);

}

}

</script>

</body>
</html>
